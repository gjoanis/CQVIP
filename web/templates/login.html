<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>CQVIP Login</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>CQVIP</h1>

        <p class="subtitle">

            Commissioning • Qualification • Validation Intelligence Platform

        </p>

        {% if error %}

        <div class="error">

            {{ error }}

        </div>

        {% endif %}

        <form
            action="/login"
            method="post"
        >

            <label>

                Username

            </label>

            <input
                type="text"
                name="username"
                required
            >

            <label>

                Password

            </label>

            <input
                type="password"
                name="password"
                required
            >

            <button
                type="submit"
                class="button"
            >

                Login

            </button>

        </form>

        <div class="demo-box">

            <strong>Demo Credentials</strong>

            <br><br>

            Username:
            <code>demo</code>

            <br>

            Password:
            <code>demo123</code>

        </div>

    </div>

</div>

</body>

</html>
